server:
  port: 8080
  servlet:
    context-path: /api

app:
  security:
    jwt:
      secret: ${JWT_SECRET:chave-secreta}
cors:
  originPatterns: http://localhost:8080,http://localhost:3000
file:
  upload-dir: /home/igor/Área de trabalho/Projetos Spring
spring:
  security:
    user:
      name: postgres
      password: 1234
  jpa:
    open-in-view: 'false'
  application:
    name: gestao
  servlet:
    multipart:
      enabled: true
      file-size-threshold: 2KB
      max-file-size: 200MB
      max-request-size: 215MB
  profiles:
    active: ${APP_PROFILE:dev}

logging:
  level:
    root: INFO


